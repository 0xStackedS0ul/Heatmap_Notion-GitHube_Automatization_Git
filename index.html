<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Efficiency</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/cal-heatmap/dist/cal-heatmap.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/cal-heatmap/dist/cal-heatmap.css">
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/cal-heatmap/dist/plugins/Tooltip.min.js"></script>

    <style>
        body {
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            padding: 20px;
            color: #37352f;
            background-color: transparent; /* Для світлої теми залишаємо прозорим (адаптується під сторінку) */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats-container {
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-card {
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 15px;
            background: #fff;
            box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 2px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
        }

        .stat-name {
            font-weight: 500;
            font-size: 14px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: #216e39;
        }

        h2 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-top: 0;
            margin-bottom: 20px;
            align-self: flex-start;
            width: 100%;
            max-width: 800px;
        }

        .legend-hint {
            font-size: 12px;
            opacity: 0.5;
            margin-top: 10px;
            text-align: center;
        }

        /* Темна тема Notion */
        @media (prefers-color-scheme: dark) {
            body {
                color: rgba(255, 255, 255, 0.9);
                background-color: #191919; /* Точний колір Notion Dark Mode */
            }

            .stat-card {
                background: #252525; /* Трохи світліше за фон (колір карток Notion) */
                border: 1px solid #373737;
                box-shadow: none;
                color: rgba(255, 255, 255, 0.9);
            }

            .stat-value {
                color: #40c463;
            }

            /* Адаптація самого календаря під темну тему */
            .cal-heatmap-container .graph-label {
                fill: rgba(255, 255, 255, 0.6) !important;
            }
        }
    </style>
</head>
<body>

    <div id="cal-heatmap"></div>
    <div class="legend-hint">
        Колір залежить від % виконання плану (100 = 1 виконана звичка)
    </div>

    <div style="width: 100%; max-width: 800px; margin-top: 30px;">
        <h2>📊 Total Repetitions (All Time)</h2>
        <div id="stats-list" class="stats-container">
            Loading stats...
        </div>
    </div>

    <script>
        const cal = new CalHeatmap();

        async function renderDashboard() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`./data.json?t=${timestamp}`);

                if (!response.ok) throw new Error("File not found");

                const fullData = await response.json();

                let heatmapSource = fullData;
                let statsSource = {};

                if (fullData.heatmap) {
                    heatmapSource = fullData.heatmap;
                    statsSource = fullData.stats || {};
                }

                // 1. Конвертуємо дати в timestamp
                const heatmapData = Object.keys(heatmapSource).map(key => ({
                    date: new Date(key).getTime(),
                    value: heatmapSource[key]
                }));

                // 2. Логіка визначення діапазону календаря
                let latestDate = new Date();

                if (heatmapData.length > 0) {
                    const sortedDates = heatmapData.sort((a, b) => b.date - a.date);
                    const maxDataDate = new Date(sortedDates[0].date);

                    if (maxDataDate > latestDate) {
                        latestDate = maxDataDate;
                    }
                }

                // Встановлюємо старт на ПОЧАТОК РОКУ (1 січня)
                const startYear = latestDate.getFullYear();
                const startDate = new Date(startYear, 0, 1);

                cal.paint({
                    itemSelector: '#cal-heatmap',
                    range: 12,
                    domain: {
                        type: 'month',
                        gutter: 4,
                        label: { text: 'MMM', position: 'top' },
                    },
                    subDomain: {
                        type: 'day',
                        radius: 2,
                        width: 11,
                        height: 11,
                        gutter: 2
                    },
                    date: {
                        start: startDate,
                        highlight: [new Date()]
                    },
                    data: {
                        source: heatmapData,
                        x: 'date',
                        y: 'value',
                        defaultValue: 0
                    },
                    scale: {
                        color: {
                            range: ['#ebedf0', '#9be9a8', '#40c463', '#30a14e', '#216e39'],
                            type: 'threshold',
                            // 50% плану, 100% (1 звичка), 200% (2 звички), 300% (3 звички)
                            domain: [50, 100, 200, 300]
                        },
                    },
                    theme: 'auto',
                }, [
                    [
                        window.Tooltip,
                        {
                            text: function (date, value, dayjsDate) {
                                const score = value ? Math.round(value) : 0;
                                return (
                                    score + "% ефективності | " +
                                    dayjsDate.format("D MMMM YYYY")
                                );
                            },
                        },
                    ],
                ]);

                // Статистика
                const statsContainer = document.getElementById('stats-list');
                statsContainer.innerHTML = '';

                const sortedStats = Object.entries(statsSource)
                    .sort(([,a], [,b]) => b - a);

                if (sortedStats.length === 0) {
                    statsContainer.innerHTML = '<p>Поки немає виконаних звичок</p>';
                } else {
                    sortedStats.forEach(([name, value]) => {
                        const card = document.createElement('div');
                        card.className = 'stat-card';
                        card.innerHTML = `
                            <span class="stat-name">${name}</span>
                            <span class="stat-value">${value}</span>
                        `;
                        statsContainer.appendChild(card);
                    });
                }

            } catch (error) {
                console.error("Error:", error);
                document.body.innerHTML = `
                    <div style="text-align:center; padding: 20px;">
                        <h3>⚠️ Помилка</h3>
                        <p>${error.message}</p>
                    </div>`;
            }
        }

        renderDashboard();
    </script>
</body>
</html>
