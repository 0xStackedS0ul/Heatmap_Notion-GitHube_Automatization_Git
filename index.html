<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydro Tactics - Neural Wire</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #191919;
            --text-color: #ffffff;
            --card-bg: #202020;
            --card-border: #2d2d2d;
            --accent-color: #ffffff;
            --active-tab-bg: #252525;
            --max-width: 1200px;
            --board-bg: #191919;
            --pulse-speed: 2s;
            --tumor-color: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px;
            color: var(--text-color); background-color: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        .controls-bar { position: fixed; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 1000; }
        .zoom-btn {
            background: var(--card-bg); border: 1px solid var(--card-border);
            color: var(--text-color); width: 28px; height: 28px; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; opacity: 0.5; transition: all 0.2s;
        }
        .zoom-btn:hover { opacity: 1; border-color: var(--accent-color); }

        .tabs-container {
            display: flex; gap: 20px; border-bottom: 1px solid var(--card-border);
            width: 100%; max-width: var(--max-width); margin-bottom: 20px; padding-left: 5px;
            margin-left: auto; margin-right: auto; flex-wrap: wrap;
        }
        .tab-btn {
            background: none; border: none; padding: 10px 12px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
            color: var(--text-color); cursor: pointer; text-transform: uppercase;
            border-bottom: 2px solid transparent; opacity: 0.4; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px; letter-spacing: 1px;
        }
        .tab-btn:hover { opacity: 1; background-color: var(--active-tab-bg); border-radius: 6px 6px 0 0; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--accent-color); color: var(--accent-color); }

        .view-section { width: 100%; max-width: var(--max-width); display: none; animation: fadeIn 0.4s ease; }
        #view-flow.active { display: flex; flex-direction: column; align-items: center; }
        #view-tanks.active { display: block; }
        #view-challenges.active { display: flex; flex-direction: column; align-items: center; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- WIRE NETWORK (D3) --- */
        #d3-tree-container {
            width: 100%; height: 70vh; min-height: 500px;
            background-color: var(--board-bg); border: 1px solid var(--card-border);
            border-radius: 12px; position: relative; cursor: grab; overflow: hidden;
        }
        #d3-tree-container:active { cursor: grabbing; }

        .hint-overlay {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-family: 'Inter', sans-serif; font-size: 12px; color: #555;
            pointer-events: none; letter-spacing: 0.5px; font-style: italic;
        }

        #pulse-status {
            font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #888;
            margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
            background: var(--card-bg); padding: 4px 12px; border-radius: 4px; border: 1px solid var(--card-border);
            letter-spacing: 1px;
        }
        .ping-dot {
            width: 6px; height: 6px; background-color: #fff; border-radius: 50%; display: inline-block;
            animation: ping var(--pulse-speed) infinite alternate ease-in-out; box-shadow: 0 0 5px #fff;
        }
        @keyframes ping { 0% { transform: scale(0.8); opacity: 0.3; } 100% { transform: scale(1.5); opacity: 1; } }

        #repulsion-control {
            position: absolute; top: 15px; left: 15px;
            background: rgba(20, 20, 20, 0.8); border: 1px solid var(--card-border);
            padding: 8px 12px; border-radius: 6px; font-family: 'JetBrains Mono', monospace;
            font-size: 10px; color: #aaa; display: flex; flex-direction: column; gap: 6px;
            z-index: 10; backdrop-filter: blur(4px);
        }
        #repulsion-control input[type=range] { width: 120px; accent-color: var(--accent-color); cursor: pointer; }

        .node-group { cursor: grab; }
        .node-group:active { cursor: grabbing; }
        .node-blob { stroke-linejoin: round; stroke-linecap: round; }
        .node-text { fill: #ccc; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 400; text-anchor: middle; pointer-events: none; }
        .node-badge { font-size: 9px; font-weight: 700; pointer-events: none; text-anchor: middle; fill: #666; }

        .link-base { fill: none; stroke: #222; stroke-width: 1px; transition: stroke 0.3s;}
        .link-pulse { fill: none; stroke: #fff; stroke-width: 1.5px; stroke-dasharray: 2 12; stroke-linecap: round; transition: stroke 0.3s;}

        @keyframes flow-animation { to { stroke-dashoffset: -28; } }

        /* --- HYDRO TANKS --- */
        .tanks-header { display: flex; justify-content: flex-end; width: 100%; max-width: var(--max-width); margin: 0 auto 15px auto; }

        .copy-btn {
            background: transparent; border: 1px solid #444; color: #aaa;
            font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
            padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase;
        }
        .copy-btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }
        .copy-btn.copied { background: #fff; color: #000; border-color: #fff; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; max-width: var(--max-width); margin: 0 auto; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 18px; display: flex; flex-direction: column; gap: 12px; transition: border-color 0.2s; }
        .stat-card:hover { border-color: #555; }
        .stat-card.infected { border-color: rgba(239, 68, 68, 0.4); background: rgba(69, 10, 10, 0.2); }

        .tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: -5px; }
        .tag { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 4px 8px; border-radius: 20px; background: transparent; border: 1px solid #444; color: #aaa; }
        .tag-arch { border-color: #fff; color: #fff; }
        .infected .tag-arch { border-color: var(--tumor-color); color: var(--tumor-color); }

        .peak-indicator { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; display: flex; align-items: center; gap: 6px; background: transparent; border: 1px solid #555; color: #888; text-transform: uppercase;}
        .peak-ready { background: #fff; color: #000; border-color: #fff; animation: pulse-white 2s infinite; }
        .infected-warning { background: rgba(239, 68, 68, 0.1); color: var(--tumor-color); border-color: var(--tumor-color); animation: pulse-red 2s infinite; }

        @keyframes pulse-white { 0% { box-shadow: 0 0 0 0 rgba(255,255,255, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(255,255,255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255, 0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239,68,68, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(239,68,68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68, 0); } }

        .stat-header { display: flex; justify-content: space-between; align-items: center; }
        .stat-name { font-size: 14px; font-weight: 500; opacity: 0.9; }
        .stat-total-row { display: flex; align-items: baseline; gap: 5px; }
        .stat-value { font-size: 28px; font-weight: 700; color: #fff; line-height: 1; font-family: 'JetBrains Mono', monospace;}
        .infected .stat-value { color: var(--tumor-color); }
        .stat-label { font-size: 10px; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px;}

        .streak-container { display: flex; gap: 8px; margin-top: auto; padding-top: 15px; border-top: 1px dashed #222; }
        .infected .streak-container { border-top-color: rgba(239,68,68, 0.3); }
        .streak-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; background: transparent; border: 1px solid #222; padding: 6px 10px; border-radius: 4px; flex: 1; justify-content: center; color: #777;}
        .streak-active { color: #fff; border-color: #555; }
        .streak-best { color: #aaa; }
        .infected .streak-badge { border-color: rgba(239,68,68,0.4); color: var(--tumor-color); }

        #zoom-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; transform-origin: top center; }

        /* --- CHALLENGES STYLES --- */
        .challenges-header {
            display: flex; flex-direction: column; align-items: center; width: 100%; max-width: var(--max-width); margin-bottom: 20px; gap: 15px;
        }
        .challenges-header .filter-select {
            width: 100%; max-width: 400px; text-align: center;
            background: var(--card-bg); border: 1px solid var(--card-border); color: #fff;
            padding: 8px 12px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
            outline: none; cursor: pointer; transition: border-color 0.2s;
        }
        .challenges-header .filter-select:hover { border-color: #555; }
        .challenges-header .filter-select option { background: var(--card-bg); color: #fff; }

        .spin-btn {
            background: var(--accent-color); color: #000; border: none; padding: 10px 30px;
            font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700;
            border-radius: 6px; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
            letter-spacing: 2px; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .spin-btn:hover { background: #ddd; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,255,255,0.4); }
        .spin-btn:active { transform: translateY(0); }
        .spin-btn:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; box-shadow: none; }

        #challenge-result-container {
            width: 100%; max-width: 800px; background-color: transparent;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 500px; text-align: center; padding-top: 20px;
        }

        #wheel-container {
            width: 320px; height: 320px; position: relative; margin-bottom: 30px;
        }

        #challenge-text-output {
            min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transform: translateY(10px); transition: all 0.5s ease;
        }
        #challenge-text-output.visible { opacity: 1; transform: translateY(0); }

        .challenge-title { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #888; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .challenge-text { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; color: #fff; line-height: 1.4; max-width: 600px;}
        .challenge-placeholder { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #555; font-style: italic; margin-top: 100px; }

    </style>
</head>
<body>

    <div class="controls-bar">
        <button class="zoom-btn" onclick="updateZoom(-0.1)" title="Zoom Out">-</button>
        <button class="zoom-btn" onclick="updateZoom(0.1)" title="Zoom In">+</button>
    </div>

    <div id="zoom-wrapper">
        <div class="header-container" style="width: 100%; max-width: var(--max-width); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-weight: 700; font-size: 14px; color: #fff; letter-spacing: 2px; font-family: 'JetBrains Mono', monospace;">
                [ INFINITY_WAY.CORE ]
            </div>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('flow')">
                <span style="font-size: 16px;">∿</span> System Wire
            </button>
            <button class="tab-btn" onclick="switchTab('tanks')">
                <span style="font-size: 14px;">■</span> Memory Tanks
            </button>
            <button class="tab-btn" onclick="switchTab('challenges')">
                <span style="font-size: 16px;">⎔</span> Challenges
            </button>
        </div>

        <div id="view-flow" class="view-section active">
            <div id="pulse-status">
                <span class="ping-dot"></span> FREQUENCY: <span id="delay-val">0.0Hz</span> | GLOBAL CHAIN: <span id="streak-val">0</span>
            </div>
            <div id="d3-tree-container">
                <div id="repulsion-control">
                    <label for="repulsion-slider">ВІДШТОВХУВАННЯ: <span id="repulsion-val">800</span></label>
                    <input type="range" id="repulsion-slider" min="100" max="2500" value="800" step="50" oninput="updateRepulsion(this.value)">
                </div>
                <div class="hint-overlay">Just start, you'll figure out along the way. [ 0 &rarr; 66 DAYS / >70% INT ]</div>
            </div>
        </div>

        <div id="view-tanks" class="view-section">
            <div class="tanks-header">
                <button id="copy-btn" class="copy-btn" onclick="copyMemoryData()">[ COPY TO CLIPBOARD ]</button>
            </div>
            <div class="stats-grid" id="stats-list">Loading memory...</div>
        </div>

        <!-- NEW CHALLENGES SECTION -->
        <div id="view-challenges" class="view-section">
            <div class="challenges-header">
                <select id="challenge-habit-select" class="filter-select" onchange="drawWheelForSelected()">
                    <option value="" disabled selected>Оберіть звичку для челенджу...</option>
                </select>
                <button id="spin-btn" class="spin-btn" onclick="spinWheel()" disabled>INITIATE SPIN</button>
            </div>
            <div id="challenge-result-container">
                <div id="wheel-container"></div>
                <div id="challenge-text-output">
                    <div class="challenge-title">МІКРО-ЧЕЛЕНДЖ:</div>
                    <div class="challenge-text" id="challenge-text-val"></div>
                </div>
                <span id="challenge-placeholder" class="challenge-placeholder">Оберіть звичку, щоб завантажити колесо ймовірностей.</span>
            </div>
        </div>
    </div>

    <script>
        let currentZoom = parseFloat(localStorage.getItem('hydro-zoom')) || 1.0;
        const zoomWrapper = document.getElementById('zoom-wrapper');

        function applyZoom() {
            if (currentZoom < 0.5) currentZoom = 0.5;
            if (currentZoom > 2.0) currentZoom = 2.0;
            zoomWrapper.style.transform = `scale(${currentZoom})`;
            localStorage.setItem('hydro-zoom', currentZoom);
        }
        function updateZoom(change) { currentZoom += change; currentZoom = Math.round(currentZoom * 10) / 10; applyZoom(); }
        applyZoom();

        function switchTab(tabName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${tabName}`).classList.add('active');
            const btns = document.querySelectorAll('.tab-btn');
            if (tabName === 'flow') btns[0].classList.add('active');
            else if (tabName === 'tanks') btns[1].classList.add('active');
            else btns[2].classList.add('active');

            if (tabName === 'challenges') {
                loadChallenges();
            }
        }

        function updateRepulsion(val) {
            document.getElementById('repulsion-val').innerText = val;
            if (window.sysSimulation) {
                window.sysSimulation.force("charge").strength(-val);
                window.sysSimulation.alpha(0.3).restart();
            }
        }

        function truncate(str, n) { return str.length > n ? str.substr(0, n - 1) + '...' : str; }

        window.memoryDumpText = "";
        function copyMemoryData() {
            if (!window.memoryDumpText) return;
            const textArea = document.createElement("textarea");
            textArea.value = window.memoryDumpText;
            textArea.style.position = "fixed"; textArea.style.left = "-9999px";
            document.body.appendChild(textArea); textArea.select();
            try {
                document.execCommand('copy');
                const btn = document.getElementById('copy-btn');
                btn.innerText = "[ DATA COPIED ]"; btn.classList.add('copied');
                setTimeout(() => { btn.innerText = "[ COPY TO CLIPBOARD ]"; btn.classList.remove('copied'); }, 2000);
            } catch (err) {}
            document.body.removeChild(textArea);
        }

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
            return Math.abs(hash);
        }

        // --- D3.js NODE GENERATION FUNCTIONS ---
        function generateBlobPath(radius, streak, id, type, time, isInfected, infectionRatio = 0) {
            let t = Math.min(Math.max(streak, 0), 66) / 66;
            if (type === 'root') t = 1.0;

            let easeT = d3.easeCubicOut(t);
            const effectiveInfection = type === 'root' ? infectionRatio : (isInfected ? 1 : 0);
            easeT = Math.max(0, easeT - effectiveInfection);

            const numPoints = 12;
            const points = [];
            const seed = simpleHash(String(id));

            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 2;
                const timeScale = 0.001;
                const wobbleSpeed = 1 + (1 - easeT) * 2 + (effectiveInfection * 3);
                const phase1 = seed + i * 2.1;
                const phase2 = seed + i * 5.7;

                const wave1 = Math.sin(time * timeScale * wobbleSpeed + phase1);
                const wave2 = Math.cos(time * timeScale * wobbleSpeed * 0.73 + phase2);
                const rand = (wave1 + wave2) * 0.5;

                const distortionMax = 0.6 + (effectiveInfection * 0.2);
                const distortion = (1 - easeT) * distortionMax * radius;
                const r = radius + rand * distortion;

                points.push([r * Math.cos(angle), r * Math.sin(angle)]);
            }
            return d3.line().curve(d3.curveCatmullRomClosed.alpha(0.5))(points);
        }

        function generateSentinelPath(radius, streak, time, isInfected) {
            const scale = !isInfected ? 1 + Math.sin(time * 0.002) * 0.1 : 1 + Math.sin(time * 0.015) * 0.25;
            const r = radius * 1.4 * scale;
            return `M 0 ${-r} L ${r} 0 L 0 ${r} L ${-r} 0 Z`;
        }

        function generateWirePath(d, time) {
            const dx = d.target.x - d.source.x;
            const dy = d.target.y - d.source.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 5) return `M${d.source.x},${d.source.y}L${d.target.x},${d.target.y}`;

            const nx = -dy / dist;
            const ny = dx / dist;

            const points = [[d.source.x, d.source.y]];
            const segments = 4;

            const streak = d.target.streak || 0;
            const t = Math.min(Math.max(streak, 0), 66) / 66;

            const isCorrupted = d.target.isInfected || (d.target.type === 'root' && d.target.infectionRatio > 0);
            const easeT = isCorrupted ? 0 : d3.easeCubicOut(t);

            const chaosAmplitude = (1 - easeT) * Math.min(dist * 0.4, 40);
            const seed = simpleHash(d.source.id + "_" + d.target.id);

            for(let i = 1; i < segments; i++) {
                const f = i / segments;
                const bx = d.source.x + f * dx;
                const by = d.source.y + f * dy;

                const staticOffset = Math.sin(seed + i * 15.3) * chaosAmplitude;
                const timeOffset = Math.sin(time * 0.001 + i * 2 + seed) * (chaosAmplitude * (isCorrupted ? 0.8 : 0.3));
                const totalOffset = staticOffset + timeOffset;

                points.push([bx + nx * totalOffset, by + ny * totalOffset]);
            }
            points.push([d.target.x, d.target.y]);
            return d3.line().curve(d3.curveCatmullRom.alpha(0.5))(points);
        }

        function getEffectiveStreak(stat) {
            if (stat.architecture === 'Інтеграл' || stat.architecture === 'Вартовий') {
                if (stat.win_rate >= 70) return 66;
                return (stat.win_rate / 70) * 66;
            }
            return stat.current_streak || 0;
        }

        function renderSystemTree(statsSource) {
            const container = document.getElementById("d3-tree-container");
            const width = container.clientWidth;
            const height = container.clientHeight;

            d3.select("#d3-tree-container svg").remove();

            const nodesData = [];
            const linksData = [];
            const rootId = "CORE";

            const totalVectorsList = [...new Set(Object.values(statsSource).map(s => "vec_" + (s.vector || "None")))];
            const infectedVectors = new Set();

            Object.entries(statsSource).forEach(([name, stat]) => {
                if (stat.architecture === 'Вартовий' && stat.win_rate < 70) {
                    infectedVectors.add("vec_" + (stat.vector || "None"));
                }
            });

            const coreInfectionRatio = totalVectorsList.length > 0 ? (infectedVectors.size / totalVectorsList.length) : 0;

            nodesData.push({
                id: rootId, name: "Infinity Way", type: "root",
                radius: 12, streak: 0,
                isInfected: coreInfectionRatio > 0, infectionRatio: coreInfectionRatio
            });

            Object.entries(statsSource).forEach(([name, stat]) => {
                const vecId = "vec_" + (stat.vector || "None");
                const archId = "arch_" + vecId + "_" + (stat.architecture || "None");
                const isVecInfected = infectedVectors.has(vecId);

                const isFailingSelf = (stat.architecture === 'Інтеграл' || stat.architecture === 'Вартовий') && stat.win_rate < 70;
                const isLeafInfected = isVecInfected || isFailingSelf;

                if (!nodesData.find(n => n.id === vecId)) {
                    nodesData.push({ id: vecId, name: stat.vector || "Інше", type: "vector", radius: 7, streak: 0, isInfected: isVecInfected });
                    linksData.push({ source: rootId, target: vecId });
                }
                if (!nodesData.find(n => n.id === archId)) {
                    nodesData.push({ id: archId, name: stat.architecture || "Дія", type: "arch", radius: 5, streak: 0, isInfected: isVecInfected });
                    linksData.push({ source: vecId, target: archId });
                }

                const leafId = "leaf_" + name;
                nodesData.push({ id: leafId, name: name, type: "leaf", stat: stat, radius: 8, streak: getEffectiveStreak(stat), isInfected: isLeafInfected });
            });

            Object.entries(statsSource).forEach(([name, stat]) => {
                const leafId = "leaf_" + name;
                let isLinkedToParent = false;

                if (stat.parent_nodes && stat.parent_nodes.trim() !== "") {
                    const parents = stat.parent_nodes.split(',').map(s => s.trim());
                    parents.forEach(pName => {
                        const parentLeafId = "leaf_" + pName;
                        if (nodesData.find(n => n.id === parentLeafId)) {
                            linksData.push({ source: parentLeafId, target: leafId });
                            isLinkedToParent = true;
                        }
                    });
                }

                if (!isLinkedToParent) {
                    const vecId = "vec_" + (stat.vector || "None");
                    const archId = "arch_" + vecId + "_" + (stat.architecture || "None");
                    linksData.push({ source: archId, target: leafId });
                }
            });

            ['arch', 'vector', 'root'].forEach(type => {
                nodesData.filter(n => n.type === type).forEach(node => {
                    const childrenLinks = linksData.filter(l => l.source === node.id || l.source.id === node.id);
                    const childrenIds = childrenLinks.map(l => typeof l.target === 'object' ? l.target.id : l.target);
                    const children = nodesData.filter(n => childrenIds.includes(n.id));

                    if(children.length > 0) {
                        const sum = children.reduce((acc, c) => acc + c.streak, 0);
                        node.streak = sum / children.length;
                    }
                });
            });

            const svg = d3.select("#d3-tree-container").append("svg")
                .attr("width", "100%")
                .attr("height", "100%");

            const defs = svg.append("defs");
            const filter = defs.append("filter").attr("id", "glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
            filter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "coloredBlur");
            const feMerge = filter.append("feMerge");
            feMerge.append("feMergeNode").attr("in", "coloredBlur");
            feMerge.append("feMergeNode").attr("in", "SourceGraphic");

            const g = svg.append("g");

            const zoom = d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => g.attr("transform", e.transform));
            svg.call(zoom);
            svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.5));

            const initRepulsion = parseInt(document.getElementById("repulsion-slider").value) || 800;

            const simulation = d3.forceSimulation(nodesData)
                .force("link", d3.forceLink(linksData).id(d => d.id).distance(d => {
                    if (d.source.type === "root") return 150;
                    if (d.source.type === "vector") return 150;
                    if (d.source.type === "leaf" && d.target.type === "leaf") return 60;
                    return 100;
                }))
                .force("charge", d3.forceManyBody().strength(-initRepulsion).distanceMax(800))
                .force("collide", d3.forceCollide().radius(d => d.type === 'leaf' ? 50 : d.radius + 30).iterations(3))
                .force("radial", d3.forceRadial(d => {
                    if (d.type === 'root') return 0;
                    if (d.type === 'vector') return 250;
                    if (d.type === 'arch') return 450;
                    return null;
                }, 0, 0).strength(d => (d.type === 'vector' || d.type === 'arch') ? 1.0 : 0.0));

            window.sysSimulation = simulation;

            const links = g.append("g").selectAll("g")
                .data(linksData)
                .join("g");

            const linkBase = links.append("path").attr("class", "link-base")
                .style("stroke", d => d.target.isInfected ? "rgba(239, 68, 68, 0.4)" : "#222");

            const linkPulse = links.append("path")
                .attr("class", "link-pulse")
                .style("opacity", d => (d.target.streak > 0 || d.target.isInfected) ? 1 : 0)
                .style("stroke", d => d.target.isInfected ? "#ef4444" : "#fff")
                .style("filter", d => (d.target.streak >= 30 || d.target.isInfected) ? "url(#glow)" : "none")
                .style("animation", d => {
                    if (d.target.isInfected) return `flow-animation 0.8s linear infinite reverse`;
                    if (d.target.streak <= 0) return "none";
                    let s = d.target.streak;
                    let duration = Math.max(0.5, 3.0 - (s * 0.04));
                    return `flow-animation ${duration}s linear infinite`;
                });

            const nodes = g.append("g").selectAll(".node-group")
                .data(nodesData)
                .join("g")
                .attr("class", "node-group")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));

            nodes.append("path")
                .attr("class", "node-blob")
                .style("fill", d => {
                    if (d.type === 'root') {
                        if (d.infectionRatio > 0) return d3.interpolateRgb("#191919", "#450a0a")(d.infectionRatio);
                        return "#191919";
                    }
                    if (d.isInfected) return "#450a0a";
                    if (d.stat && d.stat.days_to_peak <= 0 && d.stat.architecture === "Навчання") return "#fff";
                    return d.streak >= 66 ? "#fff" : "#191919";
                })
                .style("stroke", d => {
                    if (d.type === 'root') {
                        if (d.infectionRatio > 0) return d3.interpolateRgb("#ffffff", "#ef4444")(d.infectionRatio);
                        return "#fff";
                    }
                    if (d.isInfected) return "#ef4444";
                    if (d.stat && d.stat.days_to_peak <= 0 && d.stat.architecture === "Навчання") return "#fff";

                    const t = Math.min(d.streak, 66) / 66;
                    const v = Math.round(68 + t * (255 - 68));
                    return `rgb(${v}, ${v}, ${v})`;
                })
                .style("stroke-width", d => {
                    if (d.isInfected || (d.type === 'root' && d.infectionRatio > 0)) return 2.0;
                    const t = Math.min(d.streak, 66) / 66;
                    return 0.8 + (t * 0.7);
                })
                .style("filter", d => {
                    if (d.isInfected || (d.type === 'root' && d.infectionRatio > 0)) return "url(#glow)";
                    if (d.type === 'root') return "url(#glow)";
                    if (d.stat && d.stat.days_to_peak <= 0 && d.stat.architecture === "Навчання") return "url(#glow)";
                    return d.streak >= 30 ? "url(#glow)" : "none";
                });

            nodes.append("text")
                .attr("class", "node-text")
                .text(d => truncate(d.name, 20))
                .attr("dy", d => d.radius + 14)
                .style("fill", d => {
                    if (d.type === 'root') return d.infectionRatio > 0 ? "#fca5a5" : "#fff";
                    if (d.isInfected) return "#fca5a5";
                    return (d.streak > 0) ? "#fff" : "#666";
                });

            nodes.filter(d => d.type === 'leaf' && (d.streak > 0 || d.stat.architecture === 'Інтеграл' || d.stat.architecture === 'Вартовий')).append("text")
                .text(d => {
                    if (d.stat.architecture === 'Інтеграл') return `∫ ${d.stat.win_rate}%`;
                    if (d.stat.architecture === 'Вартовий') return `◈ ${d.stat.win_rate}%`;
                    let info = `✦ ${d.stat.current_streak}`;
                    if (d.stat.architecture === 'Навчання') info += ` | [${d.stat.days_to_peak}]`;
                    return info;
                })
                .attr("class", "node-badge")
                .attr("dy", d => d.radius + 26)
                .style("fill", d => {
                    if (d.stat && (d.stat.architecture === "Інтеграл" || d.stat.architecture === "Вартовий")) {
                        return d.stat.win_rate >= 70 && !d.isInfected ? "#fff" : "#ef4444";
                    }
                    if (d.isInfected) return "#ef4444";
                    if (d.stat && d.stat.days_to_peak <= 0 && d.stat.architecture === "Навчання") return "#fff";
                    return "#aaa";
                });

            simulation.on("tick", () => {});

            if (window.hydroSystemTimer) window.hydroSystemTimer.stop();
            window.hydroSystemTimer = d3.timer((elapsed) => {
                linkBase.attr("d", d => generateWirePath(d, elapsed));
                linkPulse.attr("d", d => generateWirePath(d, elapsed));
                nodes.attr("transform", d => `translate(${d.x},${d.y})`);

                nodes.select(".node-blob").attr("d", d => {
                    if (d.stat && d.stat.architecture === 'Вартовий') {
                        return generateSentinelPath(d.radius, d.streak, elapsed, !d.isInfected);
                    }
                    return generateBlobPath(d.radius, d.streak, d.id, d.type, elapsed, d.isInfected, d.infectionRatio);
                });
            });

            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x; d.fy = d.y;
            }
            function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null; d.fy = null;
            }
        }

        // --- CHALLENGES LOGIC (WHEEL) ---
        let challengesData = {};
        let currentWheelRotation = 0;

        async function loadChallenges() {
            const select = document.getElementById("challenge-habit-select");
            const spinBtn = document.getElementById("spin-btn");

            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`./challenges.json?t=${timestamp}`);
                if (!response.ok) throw new Error("Challenges file not found");
                challengesData = await response.json();
                populateChallengeHabits();
            } catch (error) {
                console.error("Error loading challenges:", error);
                document.getElementById("challenge-placeholder").innerHTML = `<span style="color: var(--tumor-color);">Помилка завантаження: ${error.message}</span>`;
                select.disabled = true;
                spinBtn.disabled = true;
            }
        }

        function populateChallengeHabits() {
            const select = document.getElementById("challenge-habit-select");
            const spinBtn = document.getElementById("spin-btn");

            while (select.options.length > 1) select.remove(1);

            const habits = Object.keys(challengesData).filter(k => challengesData[k].length > 0);
            if (habits.length === 0) {
                select.options[0].text = "Немає доступних челенджів";
                select.disabled = true;
                spinBtn.disabled = true;
                return;
            }

            habits.sort().forEach(habitName => {
                const opt = document.createElement("option");
                opt.value = habitName;
                opt.text = "✦ " + habitName;
                select.appendChild(opt);
            });

            select.disabled = false;
        }

        function drawWheelForSelected() {
            const select = document.getElementById("challenge-habit-select");
            const habit = select.value;
            const spinBtn = document.getElementById("spin-btn");
            const container = document.getElementById("wheel-container");
            const placeholder = document.getElementById("challenge-placeholder");
            const textOutput = document.getElementById("challenge-text-output");

            textOutput.classList.remove("visible");
            currentWheelRotation = 0;

            if (!habit || !challengesData[habit] || challengesData[habit].length === 0) {
                container.innerHTML = "";
                placeholder.style.display = "block";
                spinBtn.disabled = true;
                return;
            }

            placeholder.style.display = "none";
            spinBtn.disabled = false;

            const options = challengesData[habit];
            const N = options.length;

            d3.select("#wheel-container svg").remove();
            const width = 320, height = 320, radius = Math.min(width, height) / 2;

            const svg = d3.select("#wheel-container")
                .append("svg")
                .attr("width", width)
                .attr("height", height)
                .append("g")
                .attr("transform", `translate(${width/2},${height/2})`);

            // Glow filter
            const defs = svg.append("defs");
            const filter = defs.append("filter").attr("id", "wheel-glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
            filter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "coloredBlur");
            const feMerge = filter.append("feMerge");
            feMerge.append("feMergeNode").attr("in", "coloredBlur");
            feMerge.append("feMergeNode").attr("in", "SourceGraphic");

            // Background dark circle
            svg.append("circle").attr("r", radius - 10).attr("fill", "#0a0a0a").attr("stroke", "#222").attr("stroke-width", "1px");

            const wheelGroup = svg.append("g").attr("id", "wheel-g");

            const pie = d3.pie().value(1).sort(null);
            const arc = d3.arc().innerRadius(radius - 80).outerRadius(radius - 15);

            const arcs = wheelGroup.selectAll(".arc")
                .data(pie(new Array(N).fill(1)))
                .enter().append("g").attr("class", "arc");

            arcs.append("path")
                .attr("id", (d, i) => "slice-" + i)
                .attr("d", arc)
                .attr("fill", "#191919")
                .attr("stroke", "#333")
                .attr("stroke-width", "1.5px")
                .style("transition", "fill 0.3s, stroke 0.3s");

            arcs.append("text")
                .attr("transform", d => {
                    const c = arc.centroid(d);
                    // Розвертаємо текст, щоб він читався від центру назовні
                    const angle = (d.startAngle + d.endAngle) / 2 * 180 / Math.PI - 90;
                    return `translate(${c}) rotate(${angle})`;
                })
                .attr("text-anchor", "middle")
                .attr("dy", "0.35em")
                .style("fill", "#666")
                .style("font-family", "JetBrains Mono")
                .style("font-size", "12px")
                .style("font-weight", "700")
                .text((d, i) => `[${(i + 1).toString().padStart(2, '0')}]`);

            // Inner styling
            svg.append("circle").attr("r", radius - 80).attr("fill", "#111").attr("stroke", "#444").attr("stroke-width", "2px");
            svg.append("circle").attr("r", radius - 85).attr("fill", "none").attr("stroke", "#222").attr("stroke-width", "1px").attr("stroke-dasharray", "4 4");

            svg.append("text")
                .attr("text-anchor", "middle")
                .attr("dy", "0.1em")
                .style("fill", "#444")
                .style("font-family", "JetBrains Mono")
                .style("font-size", "24px")
                .style("font-weight", "700")
                .text("⎔");

            // Pointer (Top)
            const pointerG = svg.append("g").attr("transform", `translate(0, -${radius - 5})`);
            pointerG.append("polygon")
                .attr("points", "-12,-10 12,-10 0,15")
                .attr("fill", "#fff")
                .style("filter", "url(#wheel-glow)");
        }

        function spinWheel() {
            const select = document.getElementById("challenge-habit-select");
            const selectedHabit = select.value;
            const spinBtn = document.getElementById("spin-btn");
            const textOutput = document.getElementById("challenge-text-output");
            const textVal = document.getElementById("challenge-text-val");

            if (!selectedHabit || !challengesData[selectedHabit]) return;

            const options = challengesData[selectedHabit];
            const N = options.length;

            spinBtn.disabled = true;
            textOutput.classList.remove("visible");

            // Reset all slices
            d3.selectAll(".arc path").attr("fill", "#191919").attr("stroke", "#333").style("filter", "none");

            // Deterministic PRNG
            const todayStr = new Date().toISOString().split('T')[0];
            const seedStr = todayStr + "_" + selectedHabit;
            const seed = simpleHash(seedStr);

            const a = 1664525;
            const c = 1013904223;
            const m = Math.pow(2, 32);
            const rand = (a * seed + c) % m;
            const targetIndex = Math.floor((rand / m) * N);

            const challengeText = options[targetIndex];

            const sliceAngle = 360 / N;
            const extraSpins = 5 * 360;
            const targetAngleOffset = 360 - (targetIndex * sliceAngle + sliceAngle / 2);

            const baseRotation = Math.floor(currentWheelRotation / 360) * 360;
            const finalRotation = baseRotation + extraSpins + targetAngleOffset;

            currentWheelRotation = finalRotation;

            const wheelG = d3.select("#wheel-g");

            wheelG.transition()
                .duration(4000)
                .ease(d3.easeCubicOut)
                .attrTween("transform", function() {
                    const i = d3.interpolateString(this.getAttribute("transform") || "rotate(0)", `rotate(${finalRotation})`);
                    return function(t) { return i(t); };
                })
                .on("end", () => {
                    // Підсвічуємо переможний сектор
                    d3.select(`#slice-${targetIndex}`)
                        .attr("fill", "#fff")
                        .attr("stroke", "#fff")
                        .style("filter", "url(#wheel-glow)");

                    // Показуємо текст
                    textVal.innerText = challengeText;
                    textOutput.classList.add("visible");

                    spinBtn.disabled = false;
                });
        }

        // --- MAIN DASHBOARD RENDER ---
        async function renderDashboard() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`./data.json?t=${timestamp}`);
                if (!response.ok) throw new Error("File not found");

                const fullData = await response.json();
                let heatmapSource = fullData.heatmap || fullData;
                let statsSource = fullData.stats || {};

                window.globalStatsSource = statsSource;

                let globalStreak = 0;
                let checkDate = new Date();
                checkDate.setHours(0,0,0,0);

                const dateScores = {};
                Object.keys(heatmapSource).forEach(d => {
                    const dt = new Date(d);
                    dt.setHours(0,0,0,0);
                    dateScores[dt.getTime()] = heatmapSource[d];
                });

                if (dateScores[checkDate.getTime()] > 0) globalStreak++;
                checkDate.setDate(checkDate.getDate() - 1);
                while(dateScores[checkDate.getTime()] > 0) {
                    globalStreak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                }

                let pulseDuration = Math.max(0.4, 3.0 - (globalStreak * 0.15));
                let hz = (1 / pulseDuration).toFixed(1);

                document.documentElement.style.setProperty('--pulse-speed', `${pulseDuration}s`);
                document.getElementById('delay-val').innerText = `${hz}Hz`;
                document.getElementById('streak-val').innerText = globalStreak;

                if (Object.keys(statsSource).length > 0) {
                    renderSystemTree(statsSource);
                } else {
                    document.getElementById("d3-tree-container").innerHTML = '<p style="color:#555; text-align:center; padding-top: 50px; font-family: monospace;">[ SIGNAL LOST ] Start to initiate link.</p>';
                }

                const statsContainer = document.getElementById('stats-list');
                statsContainer.innerHTML = '';

                let dumpText = `[ HYDRO.CORE MEMORY DUMP ]\nDate: ${new Date().toISOString().split('T')[0]}\n\n`;

                const entries = Object.entries(statsSource).map(([name, data]) => {
                    return typeof data === 'object' ? { name, ...data } : { name, total: data, current_streak: 0, best_streak: 0 };
                });
                entries.sort((a, b) => b.total - a.total);

                if (entries.length === 0) {
                    statsContainer.innerHTML = '<p style="color:#555; font-family: monospace;">[ MEMORY EMPTY ]</p>';
                    dumpText += "[ MEMORY EMPTY ]\n";
                } else {
                    entries.forEach(stat => {
                        const card = document.createElement('div');

                        const isIntegral = stat.architecture === 'Інтеграл';
                        const isSentinel = stat.architecture === 'Вартовий';
                        const usesWinRate = isIntegral || isSentinel;
                        const isHealthy = usesWinRate ? stat.win_rate >= 70 : true;
                        const isPeak = stat.architecture === 'Навчання' && stat.days_to_peak <= 0;

                        card.className = 'stat-card' + (!isHealthy ? ' infected' : '');

                        let fireIcon = '✧';
                        if (isIntegral) fireIcon = '∫';
                        else if (isSentinel) fireIcon = '◈';
                        else if (stat.current_streak > 0) fireIcon = '✦';

                        const streakClass = usesWinRate ? (isHealthy ? 'streak-active' : '') : (stat.current_streak > 0 ? 'streak-active' : '');
                        const displayStreak = usesWinRate ? `${stat.win_rate}%` : stat.current_streak;

                        let tagsHTML = `<div class="tags-row">`;
                        if (stat.architecture) {
                            let icon = '🔁';
                            if (stat.architecture === 'Навчання') icon = '📖';
                            else if (stat.architecture === 'Поведінка') icon = '🌀';
                            else if (isIntegral) icon = '∫';
                            else if (isSentinel) icon = '◈';

                            tagsHTML += `<span class="tag tag-arch">${icon} ${stat.architecture}</span>`;
                        }
                        if (stat.vector) tagsHTML += `<span class="tag">${stat.vector}</span>`;
                        tagsHTML += `</div>`;

                        let peakHTML = '';
                        if (stat.architecture === 'Навчання' && stat.days_to_peak !== undefined && stat.days_to_peak !== null) {
                            if (isPeak) peakHTML = `<div class="peak-indicator peak-ready">[ PEAK ]</div>`;
                            else peakHTML = `<div class="peak-indicator">[ T-${stat.days_to_peak} ]</div>`;
                        }
                        if (!isHealthy) {
                            peakHTML = `<div class="peak-indicator infected-warning">[ DAMAGE ]</div>`;
                        }

                        let streakBestHTML = '';
                        if (usesWinRate) {
                            streakBestHTML = `<div class="streak-badge streak-best" title="Ціль"><span>TARGET</span><span>>70%</span></div>`;
                        } else {
                            streakBestHTML = `<div class="streak-badge streak-best" title="Рекорд"><span>MAX</span><span>${stat.best_streak}</span></div>`;
                        }

                        card.innerHTML = `
                            ${tagsHTML}
                            <div class="stat-header">
                                <span class="stat-name" style="${isPeak || (usesWinRate && isHealthy) ? 'color: #fff;' : ''}">${stat.name}</span>
                                ${peakHTML}
                            </div>
                            <div class="stat-total-row">
                                <span class="stat-value">${stat.total}</span>
                                <span class="stat-label">циклів</span>
                            </div>
                            <div class="streak-container">
                                <div class="streak-badge ${streakClass}" title="Поточна серія">
                                    <span>${fireIcon}</span>
                                    <span>${displayStreak}</span>
                                </div>
                                ${streakBestHTML}
                            </div>
                        `;
                        statsContainer.appendChild(card);

                        let tagsText = [stat.architecture, stat.vector].filter(Boolean).join(", ");
                        let alertTag = !isHealthy ? " [SYSTEM DAMAGE]" : "";
                        if (isPeak) alertTag = " [PEAK DAY]";

                        dumpText += `${fireIcon} ${displayStreak}${alertTag} | ${stat.name} (${tagsText}) -> ${stat.total} циклів (MAX: ${stat.best_streak})\n`;
                    });
                }
                window.memoryDumpText = dumpText;
            } catch (error) {
                console.error("Error:", error);
                document.body.innerHTML = `<p style="color:white; text-align:center; font-family: monospace;">[ FATAL ] ${error.message}</p>`;
            }
        }

        renderDashboard();
    </script>
</body>
