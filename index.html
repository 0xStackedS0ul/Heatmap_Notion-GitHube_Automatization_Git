<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydro Tactics</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/cal-heatmap/dist/cal-heatmap.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/cal-heatmap/dist/cal-heatmap.css">
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/cal-heatmap/dist/plugins/Tooltip.min.js"></script>

    <!-- Шрифт Inter для сучасності -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: transparent;
            --text-color: #37352f;
            --card-bg: #fff;
            --card-border: #e1e4e8;
            --accent-color: #0891b2; /* Cyan */
            --btn-hover: #f0f0f0;
        }

        /* HYDRO DARK THEME (Notion #191919) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --text-color: #E0F7FA; /* Light Cyan Text */
                --card-bg: #202020;
                --card-border: #2d2d2d;
                --accent-color: #22d3ee;
                --btn-hover: #333;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* Запобігаємо скролу при зумі */
        }

        /* --- CONTROLS --- */
        .controls-bar {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 1000;
            background: var(--bg-color); /* Щоб перекривало контент при скролі */
            border-radius: 6px;
            padding: 2px;
        }

        .zoom-btn {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-color);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            opacity: 1;
            background: var(--btn-hover);
            border-color: var(--accent-color);
        }

        /* --- WRAPPER FOR SCALING --- */
        #zoom-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transition: transform 0.2s ease;
            transform-origin: top center;
        }

        /* --- HEADER --- */
        .header-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
            margin-top: 10px; /* Місце для кнопок, якщо екран вузький */
        }

        h2 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- HEATMAP STYLES --- */
        #cal-heatmap {
            margin: auto;
        }

        .cal-heatmap-container .graph-rect {
            rx: 3px !important;
            ry: 3px !important;
        }

        .cal-heatmap-container .graph-label {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            fill: var(--text-color) !important;
            opacity: 0.5;
        }

        .legend-hint {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 12px;
            text-align: center;
            font-weight: 400;
        }

        /* --- STAT CARDS (Hydro Tanks) --- */
        .stats-grid {
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0.5;
        }

        .stat-name {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-color);
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .stat-unit {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <!-- Zoom Controls -->
    <div class="controls-bar">
        <button class="zoom-btn" onclick="updateZoom(-0.1)" title="Зменшити">-</button>
        <button class="zoom-btn" onclick="updateZoom(0.1)" title="Збільшити">+</button>
    </div>

    <!-- Scalable Content Wrapper -->
    <div id="zoom-wrapper">
        <div class="header-container">
            <h2>🌊 Hydro Tactics System</h2>
            <div style="font-size: 12px; opacity: 0.6">Frequency > Force</div>
        </div>

        <div id="cal-heatmap"></div>

        <div class="legend-hint">
            Mist (Start) &nbsp; → &nbsp; Flow (100%) &nbsp; → &nbsp; Tsunami (Max Cap)
        </div>

        <div class="stats-grid" id="stats-list">
            Loading flow data...
        </div>
    </div>

    <script>
        const cal = new CalHeatmap();

        // --- ZOOM LOGIC ---
        let currentZoom = parseFloat(localStorage.getItem('hydro-zoom')) || 1.0;
        const zoomWrapper = document.getElementById('zoom-wrapper');

        function applyZoom() {
            // Обмеження зуму від 0.5x до 2.0x
            if (currentZoom < 0.5) currentZoom = 0.5;
            if (currentZoom > 2.0) currentZoom = 2.0;

            zoomWrapper.style.transform = `scale(${currentZoom})`;
            // Зберігаємо вибір користувача
            localStorage.setItem('hydro-zoom', currentZoom);
        }

        function updateZoom(change) {
            currentZoom += change;
            // Округляємо, щоб уникнути чисел типу 1.000000001
            currentZoom = Math.round(currentZoom * 10) / 10;
            applyZoom();
        }

        // Застосувати збережений зум при старті
        applyZoom();


        async function renderDashboard() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`./data.json?t=${timestamp}`);

                if (!response.ok) throw new Error("File not found");

                const fullData = await response.json();

                let heatmapSource = fullData.heatmap || fullData;
                let statsSource = fullData.stats || {};

                const heatmapData = Object.keys(heatmapSource).map(key => ({
                    date: new Date(key).getTime(),
                    value: heatmapSource[key]
                }));

                let latestDate = new Date();
                if (heatmapData.length > 0) {
                    const sortedDates = heatmapData.sort((a, b) => b.date - a.date);
                    const maxDataDate = new Date(sortedDates[0].date);
                    if (maxDataDate > latestDate) latestDate = maxDataDate;
                }
                const startYear = latestDate.getFullYear();
                const startDate = new Date(startYear, 0, 1);

                cal.paint({
                    itemSelector: '#cal-heatmap',
                    range: 12,
                    domain: {
                        type: 'month',
                        gutter: 6,
                        label: { text: 'MMM', position: 'top' },
                    },
                    subDomain: {
                        type: 'day',
                        radius: 3,
                        width: 12,
                        height: 12,
                        gutter: 3
                    },
                    date: {
                        start: startDate,
                        highlight: [new Date()]
                    },
                    data: {
                        source: heatmapData,
                        x: 'date',
                        y: 'value',
                        defaultValue: 0
                    },
                    scale: {
                        color: {
                            range: ['#252525', '#164e63', '#0e7490', '#06b6d4', '#cffafe'],
                            type: 'threshold',
                            domain: [1, 50, 100, 200]
                        },
                    },
                    theme: 'dark',
                }, [
                    [
                        window.Tooltip,
                        {
                            text: function (date, value, dayjsDate) {
                                const score = value ? Math.round(value) : 0;
                                let status = "Dry";
                                if (score > 0) status = "Mist";
                                if (score >= 50) status = "Stream";
                                if (score >= 100) status = "River";
                                if (score >= 200) status = "Tsunami";

                                return (
                                    `${status}: ${score}% | ${dayjsDate.format("D MMM")}`
                                );
                            },
                        },
                    ],
                ]);

                const statsContainer = document.getElementById('stats-list');
                statsContainer.innerHTML = '';

                const sortedStats = Object.entries(statsSource)
                    .sort(([,a], [,b]) => b - a);

                if (sortedStats.length === 0) {
                    statsContainer.innerHTML = '<p style="opacity:0.5; font-size:12px">System dry. Initiate flow.</p>';
                } else {
                    sortedStats.forEach(([name, value]) => {
                        const card = document.createElement('div');
                        card.className = 'stat-card';

                        card.innerHTML = `
                            <span class="stat-name">${name}</span>
                            <span class="stat-value">
                                ${value} <span class="stat-unit">units</span>
                            </span>
                        `;
                        statsContainer.appendChild(card);
                    });
                }

            } catch (error) {
                console.error("Error:", error);
                document.body.innerHTML = `<p style="color:red; text-align:center">${error.message}</p>`;
            }
        }

        renderDashboard();
    </script>
</body>
</html>
