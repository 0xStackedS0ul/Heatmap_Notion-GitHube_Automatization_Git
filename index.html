<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydro Tactics</title>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/cal-heatmap/dist/cal-heatmap.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/cal-heatmap/dist/cal-heatmap.css">
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/cal-heatmap/dist/plugins/Tooltip.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: transparent;
            --text-color: #37352f;
            --card-bg: #fff;
            --card-border: #e1e4e8;
            --accent-color: #0891b2;
            --active-tab-bg: #f3f4f6;
            --streak-fire: #f59e0b; /* Orange for streak */
            --max-width: 1100px; /* Збільшена ширина для центрування */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #191919;
                --text-color: #E0F7FA;
                --card-bg: #202020;
                --card-border: #2d2d2d;
                --accent-color: #22d3ee;
                --active-tab-bg: #2d2d2d;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- CONTROLS --- */
        .controls-bar {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 1000;
        }

        .zoom-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0.7;
            transition: all 0.2s;
        }
        .zoom-btn:hover { opacity: 1; border-color: var(--accent-color); }

        /* --- TABS NAVIGATION (GitHub Style) --- */
        .tabs-container {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--card-border);
            width: 100%;
            max-width: var(--max-width);
            margin-bottom: 20px;
            padding-left: 5px;
            /* Центрування самих табів відносно сторінки */
            margin-left: auto;
            margin-right: auto;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-color);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            opacity: 0.6;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn:hover {
            opacity: 1;
            background-color: var(--active-tab-bg);
            border-radius: 6px 6px 0 0;
        }

        .tab-btn.active {
            opacity: 1;
            border-bottom: 2px solid var(--accent-color);
            font-weight: 600;
        }

        /* --- SECTIONS --- */
        .view-section {
            width: 100%;
            max-width: var(--max-width);
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease;
        }

        /* Спеціальний стиль для Flow Map щоб гарантувати центрування */
        #view-flow.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #view-tanks.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HEATMAP STYLES --- */
        #cal-heatmap {
            margin: auto;
        }
        .cal-heatmap-container .graph-rect { rx: 3px !important; ry: 3px !important; }
        .cal-heatmap-container .graph-label {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            fill: var(--text-color) !important;
            opacity: 0.5;
        }
        .legend-hint {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 12px;
            text-align: center;
            font-weight: 400;
        }

        /* --- STAT CARDS (Hydro Tanks V2) --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-name {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .stat-total-row {
            display: flex;
            align-items: baseline;
            gap: 5px;
            margin-top: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.5;
        }

        /* Панелька страйків */
        .streak-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--card-border);
        }

        .streak-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 500;
            background: var(--active-tab-bg);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .streak-icon { font-size: 14px; }
        .streak-active { color: var(--streak-fire); } /* Orange flame */
        .streak-best { color: var(--accent-color); opacity: 0.8; }

        #zoom-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: top center;
        }

    </style>
</head>
<body>

    <div class="controls-bar">
        <button class="zoom-btn" onclick="updateZoom(-0.1)" title="Zoom Out">-</button>
        <button class="zoom-btn" onclick="updateZoom(0.1)" title="Zoom In">+</button>
    </div>

    <div id="zoom-wrapper">

        <!-- Header also centered and wider -->
        <div class="header-container" style="width: 100%; max-width: var(--max-width); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-weight: 700; font-size: 14px; color: var(--accent-color); letter-spacing: 1px;">🌊 HYDRO TACTICS</div>
        </div>

        <!-- TABS -->
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('flow')">
                <span>🌊</span> Flow Map
            </button>
            <button class="tab-btn" onclick="switchTab('tanks')">
                <span>📊</span> Hydro Tanks
            </button>
        </div>

        <!-- SECTION 1: FLOW MAP -->
        <div id="view-flow" class="view-section active">
            <div id="cal-heatmap"></div>
            <div class="legend-hint">
                Mist (Start) &nbsp; → &nbsp; Flow (100%) &nbsp; → &nbsp; Tsunami (Max Cap)
            </div>
        </div>

        <!-- SECTION 2: HYDRO TANKS (Stats) -->
        <div id="view-tanks" class="view-section">
            <div class="stats-grid" id="stats-list">
                Loading tanks...
            </div>
        </div>

    </div>

    <script>
        const cal = new CalHeatmap();

        // --- ZOOM LOGIC ---
        let currentZoom = parseFloat(localStorage.getItem('hydro-zoom')) || 1.0;
        const zoomWrapper = document.getElementById('zoom-wrapper');

        function applyZoom() {
            if (currentZoom < 0.5) currentZoom = 0.5;
            if (currentZoom > 2.0) currentZoom = 2.0;
            zoomWrapper.style.transform = `scale(${currentZoom})`;
            localStorage.setItem('hydro-zoom', currentZoom);
        }

        function updateZoom(change) {
            currentZoom += change;
            currentZoom = Math.round(currentZoom * 10) / 10;
            applyZoom();
        }
        applyZoom();

        // --- TABS LOGIC ---
        function switchTab(tabName) {
            // Hide all sections
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            // Show selected
            document.getElementById(`view-${tabName}`).classList.add('active');

            // Highlight button
            const btns = document.querySelectorAll('.tab-btn');
            if (tabName === 'flow') btns[0].classList.add('active');
            else btns[1].classList.add('active');
        }

        async function renderDashboard() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`./data.json?t=${timestamp}`);

                if (!response.ok) throw new Error("File not found");

                const fullData = await response.json();

                let heatmapSource = fullData.heatmap || fullData;
                let statsSource = fullData.stats || {};

                // --- RENDER HEATMAP ---
                const heatmapData = Object.keys(heatmapSource).map(key => ({
                    date: new Date(key).getTime(),
                    value: heatmapSource[key]
                }));

                let latestDate = new Date();
                if (heatmapData.length > 0) {
                    const sortedDates = heatmapData.sort((a, b) => b.date - a.date);
                    const maxDataDate = new Date(sortedDates[0].date);
                    if (maxDataDate > latestDate) latestDate = maxDataDate;
                }
                const startYear = latestDate.getFullYear();
                const startDate = new Date(startYear, 0, 1);

                cal.paint({
                    itemSelector: '#cal-heatmap',
                    range: 12,
                    domain: {
                        type: 'month',
                        gutter: 6,
                        label: { text: 'MMM', position: 'top' },
                    },
                    subDomain: {
                        type: 'day',
                        radius: 3,
                        width: 12,
                        height: 12,
                        gutter: 3
                    },
                    date: { start: startDate, highlight: [new Date()] },
                    data: { source: heatmapData, x: 'date', y: 'value', defaultValue: 0 },
                    scale: {
                        color: {
                            range: ['#252525', '#164e63', '#0e7490', '#06b6d4', '#cffafe'],
                            type: 'threshold',
                            domain: [1, 50, 100, 200]
                        },
                    },
                    theme: 'dark',
                }, [
                    [ window.Tooltip, {
                        text: function (date, value, dayjsDate) {
                            const score = value ? Math.round(value) : 0;
                            let status = "Dry";
                            if (score > 0) status = "Mist";
                            if (score >= 50) status = "Stream";
                            if (score >= 100) status = "River";
                            if (score >= 200) status = "Tsunami";
                            return `${status}: ${score}% | ${dayjsDate.format("D MMM")}`;
                        },
                    }],
                ]);

                // --- RENDER STATS (NEW DESIGN) ---
                const statsContainer = document.getElementById('stats-list');
                statsContainer.innerHTML = '';

                // Handle both old format (value only) and new format (object with total/streak)
                // We convert everything to array for sorting
                const entries = Object.entries(statsSource).map(([name, data]) => {
                    if (typeof data === 'object') {
                        return { name, ...data };
                    } else {
                        return { name, total: data, current_streak: 0, best_streak: 0 };
                    }
                });

                // Sort by Total Volume
                entries.sort((a, b) => b.total - a.total);

                if (entries.length === 0) {
                    statsContainer.innerHTML = '<p style="opacity:0.5; font-size:12px">System dry.</p>';
                } else {
                    entries.forEach(stat => {
                        const card = document.createElement('div');
                        card.className = 'stat-card';

                        // Icons for streaks
                        const fireIcon = stat.current_streak > 0 ? '🔥' : '🧊';
                        const streakClass = stat.current_streak > 0 ? 'streak-active' : '';

                        card.innerHTML = `
                            <div class="stat-header">
                                <span class="stat-name">${stat.name}</span>
                            </div>
                            <div class="stat-total-row">
                                <span class="stat-value">${stat.total}</span>
                                <span class="stat-label">total units</span>
                            </div>
                            <div class="streak-container">
                                <div class="streak-badge ${streakClass}" title="Поточна серія">
                                    <span class="streak-icon">${fireIcon}</span>
                                    <span>${stat.current_streak} days</span>
                                </div>
                                <div class="streak-badge streak-best" title="Рекорд">
                                    <span class="streak-icon">🏆</span>
                                    <span>${stat.best_streak} best</span>
                                </div>
                            </div>
                        `;
                        statsContainer.appendChild(card);
                    });
                }

            } catch (error) {
                console.error("Error:", error);
                document.body.innerHTML = `<p style="color:red; text-align:center">${error.message}</p>`;
            }
        }

        renderDashboard();
    </script>
</body>
</html>
